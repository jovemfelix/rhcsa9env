---
- name: Resetting Server 1
  hosts: server1
  strategy: free
  ignore_errors: true
  gather_facts: false
  vars:
    lab_hosts: |
      127.0.0.1   localhost localhost.localdomain localhost4 localhost4.localdomain4
      ::1         localhost localhost.localdomain localhost6 localhost6.localdomain6
      192.168.55.149 repo.nine.example.com repo
      192.168.55.150 server1.nine.example.com server1
      192.168.55.151 server2.nine.example.com server2
  tasks:
    - name: Resetting Hostname
      hostname:
        name: server1.nine.example.com

    - import_tasks: tasks/network-static.yml

    - name: Rebuilding Host File
      copy:
        dest: /etc/hosts
        content: "{{ lab_hosts }}"
        force: true

    - import_tasks: tasks/sysctl-lab-no-forward.yml

    - name: Resetting Timezone
      command: timedatectl set-timezone America/Los_Angeles
      changed_when: false

    - name: Erasing Repos
      file:
        path: /etc/yum.repos.d
        state: absent

    - name: Recreate empty yum.repos.d
      file:
        path: /etc/yum.repos.d
        state: directory
        mode: "0755"

    - name: Erasing Web Server Configuration
      file:
        path: /var/www/html
        state: absent

    - name: Recreate web root
      file:
        path: /var/www/html
        state: directory
        mode: "0755"

    - name: Erasing Shell Script (if present)
      file:
        path: /awesome.sh
        state: absent

    - name: Removing users
      user:
        name: "{{ item }}"
        state: absent
        remove: true
      loop:
        - phil
        - laura
        - stewart
        - kevin

    - name: Removing Added Directories
      file:
        path: "/{{ item }}"
        state: absent
      loop:
        - accounting
        - marketing

    - name: Removing Temporary Files
      file:
        path: "/{{ item }}"
        state: absent
      loop:
        - tmp
        - find

    - name: Restore original GRUB configuration
      copy:
        src: /etc/default/grub.laborig
        dest: /etc/default/grub
        remote_src: true
      ignore_errors: true

    - name: Regenerate GRUB config
      command: grub2-mkconfig -o /boot/grub2/grub.cfg
      changed_when: false
      ignore_errors: true

    - name: Restart firewalld
      service:
        name: firewalld
        state: restarted
        enabled: true

    - import_tasks: tasks/lab-repo-client.yml

    - name: Ensure httpd is installed from lab mirror
      dnf:
        name: httpd
        state: present
      retries: 5
      delay: 10

    - import_tasks: tasks/httpd-lab.yml
    - import_tasks: tasks/firewall-lab-services.yml

    - import_tasks: tasks/sysctl-lab-ipv6.yml

    - import_tasks: tasks/passwords-lab.yml

    - name: Recreate Welcome Message
      file:
        path: /etc/profile.d/welcome.sh
        state: touch
        mode: "0755"

    - name: Building Welcome Message
      blockinfile:
        dest: /etc/profile.d/welcome.sh
        block: |
          #!/bin/bash
          #
          echo -e '
          #          _     _        _        _         _           _          _   _        _
          #         / /\  /\ \     /\_\     / /\      /\ \        /\ \       /\_\/\_\ _   / /\
          #        / /  \ \ \ \   / / /    / /  \     \_\ \      /  \ \     / / / / //\_\/ /  \
          #       / / /\ \_\ \ \_/ / /    / / /\ \__  /\__ \    / /\ \ \   /\ \/ \ \/ / /_/ /\ \
          #      / / /\ \___\ \___/ /    / / /\ \___\/ /_ \ \  / / /\ \_\ /  \____\__/ /\_\/\ \ \
          #      \ \ \ \/___/\ \ \_/     \ \ \ \/___/ / /\ \ \/ /_/_ \/_// /\/________/      \ \ \
          #       \ \ \       \ \ \       \ \ \    / / /  \/_/ /____/\  / / /\/_// / /        \ \ \
          #   _    \ \ \       \ \ \  _    \ \ \  / / /     / /\____\/ / / /    / / /          \ \ \
          #  /_/\__/ / /        \ \ \/_/\__/ / / / / /     / / /______/ / /    / / /          __\ \ \___
          #  \ \/___/ /          \ \_\ \/___/ / /_/ /     / / /_______\/_/    / / /          /___\_\/__/\
          #   \_____\/            \/_/\_____\/  \_\/      \/__________/       \/_/           \_________\/
          '"#
          # You are logged into \"`hostname`\" as the \"`whoami`\" account.
          # Release: `cat /etc/redhat-release 2>/dev/null || cat /etc/os-release`
          #
          # For root - use \`sudo\` or \`sudo su -\`
          #
          # Repo/AppStream
          # http://repo.nine.example.com/BaseOS
          # http://repo.nine.example.com/AppStream
          "

    - import_tasks: tasks/selinux-lab.yml
      vars:
        selinux_lab_state: permissive

    - name: Rebooting Host
      reboot:

- name: Resetting Server 2
  hosts: server2
  strategy: free
  gather_facts: false
  ignore_errors: true
  vars:
    lab_hosts: |
      127.0.0.1   localhost localhost.localdomain localhost4 localhost4.localdomain4
      ::1         localhost localhost.localdomain localhost6 localhost6.localdomain6
      192.168.55.149 repo.nine.example.com repo
      192.168.55.150 server1.nine.example.com server1
      192.168.55.151 server2.nine.example.com server2
  tasks:
    - name: Resetting Hostname
      hostname:
        name: server2.nine.example.com

    - import_tasks: tasks/network-static.yml

    - name: Building Host File
      copy:
        dest: /etc/hosts
        content: "{{ lab_hosts }}"
        force: true

    - import_tasks: tasks/sysctl-lab-no-forward.yml

    - name: Resetting Timezone
      command: timedatectl set-timezone America/Los_Angeles
      changed_when: false

    - name: Erasing Web Server Configuration
      file:
        path: /var/www/html
        state: absent

    - name: Recreate web root
      file:
        path: /var/www/html
        state: directory
        mode: "0755"

    - name: Erasing Shell Script (if present)
      file:
        path: /awesome.sh
        state: absent

    - name: Removing users
      user:
        name: "{{ item }}"
        state: absent
        remove: true
      loop:
        - phil
        - laura
        - stewart
        - kevin

    - name: Removing Added Directories
      file:
        path: "/{{ item }}"
        state: absent
      loop:
        - accounting
        - marketing

    - name: Removing Temporary Files
      file:
        path: "/{{ item }}"
        state: absent
      loop:
        - tmp
        - find

    - import_tasks: tasks/wipe-extra-disk.yml

    - name: Erasing Repos
      file:
        path: /etc/yum.repos.d
        state: absent

    - name: Recreate empty yum.repos.d
      file:
        path: /etc/yum.repos.d
        state: directory
        mode: "0755"

    - import_tasks: tasks/lab-repo-client.yml

    - name: Install baseline packages from lab repo
      dnf:
        name:
          - man-pages
          - httpd
        state: present
      register: lab_packages_install
      retries: 5
      delay: 15
      until: lab_packages_install is succeeded

    - name: Starting firewalld
      service:
        name: firewalld
        state: started
        enabled: true

    - import_tasks: tasks/httpd-lab.yml

    - name: Erasing Repos
      file:
        path: /etc/yum.repos.d
        state: absent

    - name: Recreate empty yum.repos.d
      file:
        path: /etc/yum.repos.d
        state: directory
        mode: "0755"

    - import_tasks: tasks/passwords-lab.yml

    - name: Creating Welcome Message
      file:
        path: /etc/profile.d/welcome.sh
        state: touch
        mode: "0755"

    - name: Building Welcome Message
      blockinfile:
        dest: /etc/profile.d/welcome.sh
        mode: "0644"
        block: |
          #!/bin/bash
          #
          echo -e '
          #          _     _        _        _         _           _          _   _         _
          #         / /\  /\ \     /\_\     / /\      /\ \        /\ \       /\_\/\_\ _   /\ \
          #        / /  \ \ \ \   / / /    / /  \     \_\ \      /  \ \     / / / / //\_\/  \ \
          #       / / /\ \_\ \ \_/ / /    / / /\ \__  /\__ \    / /\ \ \   /\ \/ \ \/ / / /\ \ \
          #      / / /\ \___\ \___/ /    / / /\ \___\/ /_ \ \  / / /\ \_\ /  \____\__/ /\/_/\ \ \
          #      \ \ \ \/___/\ \ \_/     \ \ \ \/___/ / /\ \ \/ /_/_ \/_// /\/________/     / / /
          #       \ \ \       \ \ \       \ \ \    / / /  \/_/ /____/\  / / /\/_// / /     / / /
          #   _    \ \ \       \ \ \  _    \ \ \  / / /     / /\____\/ / / /    / / /     / / /  _
          #  /_/\__/ / /        \ \ \/_/\__/ / / / / /     / / /______/ / /    / / /     / / /_/\_\
          #  \ \/___/ /          \ \_\ \/___/ / /_/ /     / / /_______\/_/    / / /     / /_____/ /
          #   \_____\/            \/_/\_____\/  \_\/      \/__________/       \/_/      \________/
          '"#
          # You are logged into \"`hostname`\" as the \"`whoami`\" account.
          # Release: `cat /etc/redhat-release 2>/dev/null || cat /etc/os-release`
          #
          # For root - use \`sudo\` or \`sudo su -\`
          #
          # Repo/AppStream
          # http://repo.nine.example.com/BaseOS
          # http://repo.nine.example.com/AppStream
          #
          # Two additional NICs are on this host.
          "

    - import_tasks: tasks/selinux-lab.yml
      vars:
        selinux_lab_state: permissive

    - name: Rebooting Server 2
      reboot:

    - name: Environment Reset Complete
      debug:
        msg:
          - "Server 1 and Server 2 have been reset successfully."
          - "Server 2 is rebooting; wait a moment before reconnecting."
          - "Server 1 - 192.168.55.150 | Server 2 - 192.168.55.151"
          - "Credentials - vagrant/vagrant or root/password"
          - "Example - ssh vagrant@192.168.55.150 or vagrant ssh server1"
