---
- name: RHCSA 9 lab deployment complete
  hosts: server1
  strategy: free
  gather_facts: false
  become: true
  tasks:
    - name: Welcome message
      debug:
        msg:
          - "Repo, Server 1, and Server 2 are configured (CentOS Stream 9 / RHCSA 9 objectives)."
          - "Server 1 is rebooting; wait a moment before reconnecting."
          - "Server 1 - 192.168.55.150 | Server 2 - 192.168.55.151"
          - "Credentials - vagrant/vagrant or root/password"
          - "Example - ssh vagrant@192.168.55.150 or vagrant ssh server1"
          - "Server 2 has two extra NICs and two extra disks."
