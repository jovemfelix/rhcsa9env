---
- name: Setting Up Server 1
  hosts: server1
  strategy: free
  ignore_errors: true
  gather_facts: false
  vars:
    lab_hosts: |
      127.0.0.1   localhost localhost.localdomain localhost4 localhost4.localdomain4
      ::1         localhost localhost.localdomain localhost6 localhost6.localdomain6
      192.168.55.149 repo.nine.example.com repo
      192.168.55.150 server1.nine.example.com server1
      192.168.55.151 server2.nine.example.com server2
  tasks:
    - name: Setting Hostname
      hostname:
        name: server1.nine.example.com

    - import_tasks: tasks/network-static.yml

    - name: Building Host File
      copy:
        dest: /etc/hosts
        content: "{{ lab_hosts }}"
        force: true

    - name: Backup original GRUB configuration for reset playbook
      copy:
        src: /etc/default/grub
        dest: /etc/default/grub.laborig
        remote_src: true
        force: false

    - name: Ensure yum.repos.d exists before lab repo
      file:
        path: /etc/yum.repos.d
        state: directory
        mode: "0755"

    - import_tasks: tasks/lab-repo-client.yml

    - name: Install httpd from lab mirror (exam-style offline repo)
      dnf:
        name: httpd
        state: present
      register: httpd_install
      retries: 5
      delay: 10
      until: httpd_install is succeeded

    - name: Erasing Repos
      file:
        path: /etc/yum.repos.d
        state: absent

    - name: Recreate empty yum.repos.d
      file:
        path: /etc/yum.repos.d
        state: directory
        mode: "0755"

    - name: Starting firewalld
      service:
        name: firewalld
        state: started
        enabled: true

    - import_tasks: tasks/httpd-lab.yml
    - import_tasks: tasks/firewall-lab-services.yml

    - import_tasks: tasks/sysctl-lab-ipv6.yml

    - import_tasks: tasks/passwords-lab.yml

    - name: Creating Welcome Message
      file:
        path: /etc/profile.d/welcome.sh
        state: touch
        mode: "0755"

    - name: Building Welcome Message
      blockinfile:
        dest: /etc/profile.d/welcome.sh
        block: |
          #!/bin/bash
          #
          echo -e '
          #          _     _        _        _         _           _          _   _        _
          #         / /\  /\ \     /\_\     / /\      /\ \        /\ \       /\_\/\_\ _   / /\
          #        / /  \ \ \ \   / / /    / /  \     \_\ \      /  \ \     / / / / //\_\/ /  \
          #       / / /\ \_\ \ \_/ / /    / / /\ \__  /\__ \    / /\ \ \   /\ \/ \ \/ / /_/ /\ \
          #      / / /\ \___\ \___/ /    / / /\ \___\/ /_ \ \  / / /\ \_\ /  \____\__/ /\_\/\ \ \
          #      \ \ \ \/___/\ \ \_/     \ \ \ \/___/ / /\ \ \/ /_/_ \/_// /\/________/      \ \ \
          #       \ \ \       \ \ \       \ \ \    / / /  \/_/ /____/\  / / /\/_// / /        \ \ \
          #   _    \ \ \       \ \ \  _    \ \ \  / / /     / /\____\/ / / /    / / /          \ \ \
          #  /_/\__/ / /        \ \ \/_/\__/ / / / / /     / / /______/ / /    / / /          __\ \ \___
          #  \ \/___/ /          \ \_\ \/___/ / /_/ /     / / /_______\/_/    / / /          /___\_\/__/\
          #   \_____\/            \/_/\_____\/  \_\/      \/__________/       \/_/           \_________\/
          '"#
          # You are logged into \"`hostname`\" as the \"`whoami`\" account.
          # Release: `cat /etc/redhat-release 2>/dev/null || cat /etc/os-release`
          #
          # For root - use \`sudo\` or \`sudo su -\`
          #
          # Repo/AppStream
          # http://repo.nine.example.com/BaseOS
          # http://repo.nine.example.com/AppStream
          "

    - import_tasks: tasks/selinux-lab.yml
      vars:
        selinux_lab_state: enforcing
